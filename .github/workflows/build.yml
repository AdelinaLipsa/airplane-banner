name: Build installers

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to publish GitHub Releases on tag builds

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:isolate
      - run: npm run lint
      - run: npm test
      # Boot the real app headlessly (Xvfb) to catch startup/wiring crashes.
      - name: Electron smoke test
        env:
          SMOKE_TEST: '1'
        run: xvfb-run -a npx electron . --no-sandbox

  build:
    needs: quality
    # Only build installers for releases (tag pushes) or manual runs.
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build: npx electron-builder --mac --universal
          - os: windows-latest
            build: npx electron-builder --win --x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:isolate   # bundle the subject-isolation module into the app

      # The real OAuth client lives in repo secrets (Settings → Secrets and
      # variables → Actions): OAUTH_CLIENT_ID and OAUTH_CLIENT_SECRET. Without
      # them the build still succeeds, but sign-in is disabled in that build.
      - name: Write OAuth credentials (if provided)
        shell: bash
        env:
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: |
          if [ -n "$OAUTH_CLIENT_ID" ]; then
            printf "module.exports = { clientId: '%s', clientSecret: '%s' };\n" \
              "$OAUTH_CLIENT_ID" "$OAUTH_CLIENT_SECRET" > src/main/oauth-credentials.local.js
            echo "Wrote oauth-credentials.local.js"
          else
            echo "No OAUTH_CLIENT_ID secret set — building without embedded sign-in."
          fi

      # Build only — never publish here. A single release job (below) collects
      # every platform's artifacts and publishes one clean release, avoiding the
      # race where parallel per-platform publishes each create their own draft.
      - run: ${{ matrix.build }} --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

  # One release for the tag: download every platform's artifacts and publish a
  # single, non-draft GitHub Release (the electron-updater feed for all OSes).
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: ls -R artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag_name: ${{ github.ref_name }}
          body: |
            ### Which file do I download?
            - **macOS** → the **`.dmg`** (universal — works on both Apple Silicon and Intel Macs)
            - **Windows** → the **`.exe`**

            The `.zip`, `.yml`, and `.blockmap` files are for the in-app auto-updater — you can ignore them.

            **macOS first launch:** this build isn't notarized by Apple yet, so macOS may say it "could not verify" the app. Right-click the app → **Open** → **Open**, or run:
            `xattr -dr com.apple.quarantine "/Applications/Airplane Banner.app"`
          files: artifacts/**/*
          fail_on_unmatched_files: true
