<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; cursor: pointer; }
    /* Brand pill (Retro Arcade): indigo body, yellow text, monospace. */
    #pill {
      display: flex; align-items: center; gap: 7px;
      height: 34px; margin: 7px; padding: 0 13px; box-sizing: border-box;
      background: #1e1b4b; color: #facc15;
      border: 1px solid rgba(255, 255, 255, 0.14); border-radius: 17px;
      font: 700 13px ui-monospace, Menlo, "Courier New", monospace;
      box-shadow: 0 5px 16px rgba(0, 0, 0, 0.4);
      white-space: nowrap; overflow: hidden;
    }
    #plane { filter: drop-shadow(1px 1px 0 #f43f5e); }
    #txt { overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body title="Click to join / open menu">
  <div id="pill"><span id="plane">✈</span><span id="txt"></span></div>
  <script src="note.js"></script>
</body>
</html>
