<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    /* Brand palette (Retro Arcade): indigo ink, yellow fabric, pink pop —
       the same colors the banner flies in. Themed via vars so a single
       prefers-color-scheme block flips the whole window to dark. */
    :root {
      color-scheme: light dark;
      --bg: #fffdf5; --fg: #1e1b4b; --muted: #6b7280;
      --card-bg: #ffffff; --card-border: #e7e3d8;
      --field-bg: #ffffff; --field-border: #d6d3ca;
      --legend: #1e1b4b; --accent: #1e1b4b; --accent-fg: #facc15; --pop: #f43f5e;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14132b; --fg: #ece9ff; --muted: #9b97c4;
        --card-bg: #1b1940; --card-border: #2c2a52;
        --field-bg: #221f4a; --field-border: #3a3766;
        --legend: #facc15; --accent: #facc15; --accent-fg: #1e1b4b; --pop: #fb7185;
      }
    }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; color: var(--fg); background: var(--bg); }
    h1 { font-size: 18px; font-family: ui-monospace, Menlo, "Courier New", monospace; letter-spacing: 0.5px; }
    /* Collapsible sections — native <details>/<summary> accordions. */
    details { border: 1px solid var(--card-border); border-radius: 10px; margin: 14px 0; padding: 0 14px; background: var(--card-bg); }
    details[open] { padding-bottom: 12px; }
    summary { font-weight: 700; font-family: ui-monospace, Menlo, "Courier New", monospace; color: var(--legend); padding: 11px 2px; cursor: pointer; list-style: none; user-select: none; }
    summary::-webkit-details-marker { display: none; }
    summary::before { content: "\25B8"; display: inline-block; width: 1em; color: var(--muted); transition: transform 0.15s ease; }
    details[open] > summary::before { transform: rotate(90deg); }
    label { display: block; margin: 8px 0; font-size: 14px; }
    input[type=text], input[type=password], input[type=number], select {
      padding: 6px; box-sizing: border-box; background: var(--field-bg); color: var(--fg);
      border: 1px solid var(--field-border); border-radius: 6px; }
    input[type=text], input[type=password] { width: 100%; }
    .row { display: flex; align-items: center; gap: 8px; }
    button { background: var(--accent); color: var(--accent-fg); border: 0; border-radius: 6px;
             padding: 8px 14px; font-weight: 700; cursor: pointer; }
    button:hover { filter: brightness(1.06); }
    #status { font-size: 13px; color: var(--muted); }
    #saved { color: var(--pop); font-weight: 700; }
    .save-bar { position: sticky; bottom: 0; background: var(--bg); padding-top: 10px; }
    .account { border: 1px solid var(--card-border); border-radius: 8px; padding: 10px; margin: 8px 0; }
    .account-head { display: flex; align-items: center; justify-content: space-between; }
    .account-email { font-weight: 600; font-size: 14px; }
    .account-head button { background: transparent; color: var(--muted); border: 1px solid var(--field-border); padding: 4px 10px; font-weight: 500; }
    .cal-list { margin: 6px 0 0; }
    .cal-list label { margin: 5px 0; }
    .cal-primary { font-size: 11px; color: var(--muted); }
    .cal-empty { font-size: 12px; color: var(--muted); margin: 6px 0 0; }
    .cal-color { display: inline-flex; align-items: center; gap: 4px; margin-left: auto; }
    .cal-color input[type=color] { width: 26px; height: 20px; padding: 0; border: 1px solid var(--field-border); border-radius: 4px; cursor: pointer; }
    .cal-color input[type=color]:disabled { opacity: 0.35; cursor: default; }
    .cal-list label.row { display: flex; align-items: center; }

    /* Live theme preview — a tiny banner+plane loops across so the four styles
       can be compared without a Test flight. */
    #themePreview {
      position: relative; height: 84px; margin: 10px 0 4px; border-radius: 10px;
      overflow: hidden; border: 1px solid #e5e7eb;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
    }
    .mini-flight {
      position: absolute; top: 50%; left: 0; display: flex; align-items: center; gap: 6px;
      animation: miniFly 7s linear infinite;
    }
    @keyframes miniFly {
      from { transform: translate(-70%, -50%); }
      to   { transform: translate(540px, -50%); }
    }
    .mini-plane { height: 30px; filter: drop-shadow(3px 3px 0 var(--prevPop, #f43f5e)); }
    .mini-banner { white-space: nowrap; font-size: 13px; font-weight: 700; padding: 7px 13px; border-radius: 6px; }
    #themePreview[data-theme="retro"] .mini-banner {
      background: #facc15; color: #1e1b4b; font-family: ui-monospace, Menlo, monospace; box-shadow: 3px 3px 0 #f43f5e;
    }
    #themePreview[data-theme="aurora"] { background: linear-gradient(135deg, #0b1020, #1f2937); }
    #themePreview[data-theme="aurora"] .mini-banner {
      background: rgba(255,255,255,0.08); color: #e9f6ff; border: 1px solid rgba(255,255,255,0.3);
      -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); box-shadow: 0 0 18px rgba(94,234,212,0.55);
    }
    #themePreview[data-theme="sunset"] .mini-banner {
      background: linear-gradient(90deg, #fb7185, #f97316, #a855f7); color: #fff; border-radius: 999px;
      box-shadow: 0 8px 16px rgba(168,85,247,0.4);
    }
    #themePreview[data-theme="mono"] { background: #e5e7eb; }
    #themePreview[data-theme="mono"] .mini-banner {
      background: #0a0a0a; color: #fafafa; font-family: ui-monospace, Menlo, monospace;
      text-transform: uppercase; letter-spacing: 1px; border-radius: 3px;
    }
    @media (prefers-reduced-motion: reduce) { .mini-flight { animation: none; transform: translate(20px, -50%); } }
  </style>
</head>
<body>
  <h1>✈️ Airplane Banner</h1>

  <details open>
    <summary>Google Calendar accounts</summary>
    <p id="status">Checking…</p>
    <div id="accountsList"></div>
    <div class="row" style="margin-top:8px">
      <button id="signIn">+ Add account</button>
    </div>
  </details>

  <details open>
    <summary>Reminders</summary>
    <label>Minutes before each meeting (comma-separated)
      <input id="offsets" type="text" placeholder="15, 5, 0" />
    </label>
    <label class="row"><input id="respectEventReminders" type="checkbox" /> Use each meeting’s own reminder times when it sets them</label>
    <p style="font-size:12px;color:#888;margin:4px 0 0">Tip: add <code>[no-fly]</code> to a meeting’s title to skip it.</p>
  </details>

  <details open>
    <summary>When to fly</summary>
    <label class="row"><input id="activeHoursEnabled" type="checkbox" /> Only fly during working hours</label>
    <div id="activeHoursOpts" style="margin-left:24px">
      <label class="row">From
        <input id="startHour" type="number" min="0" max="23" style="width:60px" /> :00 &nbsp;to&nbsp;
        <input id="endHour" type="number" min="0" max="24" style="width:60px" /> :00
      </label>
      <div class="row" id="dayToggles" style="flex-wrap:wrap"></div>
    </div>
    <label class="row" style="margin-top:10px"><input id="suppressInFullscreen" type="checkbox" /> Don’t fly while another app is fullscreen (e.g. presenting)</label>
    <label class="row"><input id="suppressInDnd" type="checkbox" /> Don’t fly while a Focus / Do Not Disturb is on</label>
    <label style="margin-top:10px">Fly on
      <select id="flightScreen">
        <option value="cursor">The screen my cursor is on</option>
        <option value="primary">My primary screen</option>
      </select>
    </label>
  </details>

  <details open>
    <summary>Which meetings</summary>
    <label class="row"><input id="skipAllDay" type="checkbox" /> Skip all-day events</label>
    <label class="row"><input id="skipDeclined" type="checkbox" /> Skip events I declined</label>
    <label class="row"><input id="requireAttendeesOrLink" type="checkbox" /> Require attendees or a video link</label>
    <label class="row"><input id="showTitle" type="checkbox" /> Show meeting title on banner</label>
  </details>

  <details open>
    <summary>Appearance</summary>
    <label>Aircraft
      <select id="craft">
        <option value="tarom">TAROM plane (default)</option>
        <option value="ufo">UFO</option>
        <option value="rickroll">Rick Roll (dancing GIF)</option>
        <option value="custom">Custom image / GIF…</option>
      </select>
    </label>
    <div id="customCraftRow" class="row" style="margin-left:24px;display:none">
      <button id="chooseCraft" type="button" style="padding:4px 10px">Choose file…</button>
      <span id="craftFileName" style="color:var(--muted);font-size:12px"></span>
    </div>
    <label>Banner theme
      <select id="theme">
        <option value="retro">Retro Arcade — yellow fabric, indigo, pink</option>
        <option value="aurora">Aurora Glass — dark, neon teal/violet</option>
        <option value="sunset">Sunset Pop — coral/orange, white</option>
        <option value="mono">Mono Minimal — black & white</option>
      </select>
    </label>
    <div id="themePreview" data-theme="retro">
      <div class="mini-flight">
        <div class="mini-banner">10 MIN → STANDUP</div>
        <img class="mini-plane" src="../overlay/plane.png" alt="" />
      </div>
    </div>
    <label>Flight duration: <strong id="durLabel">12s</strong> <span style="color:#888">(faster ⟷ slower)</span>
      <input id="flightDuration" type="range" min="4" max="30" step="1" style="width:100%" />
    </label>
    <label class="row"><input id="sound" type="checkbox" /> Play a sound when the plane flies</label>
    <div id="rickSoundNote" style="display:none;margin:4px 0 0 24px;color:var(--muted);font-size:12px">🎵 Rick Roll flies with its own song — chime options are off.</div>
    <div id="soundOpts" style="margin-left:24px">
      <label class="row">Chime
        <select id="soundName"></select>
        <button id="soundPreview" type="button" style="padding:4px 10px">▶ Preview</button>
      </label>
      <label>Volume: <strong id="volLabel">20%</strong>
        <input id="soundVolume" type="range" min="0" max="100" step="5" style="width:100%" />
      </label>
    </div>
    <label class="row"><input id="clickableBanner" type="checkbox" /> Click the banner to join the meeting</label>
    <div class="row" style="margin-top:12px">
      <button id="testFlight" type="button">✈️ Test flight</button>
      <span style="color:#888;font-size:12px">Preview with the settings above (no need to Save)</span>
    </div>
  </details>

  <details open>
    <summary>App</summary>
    <label class="row"><input id="launchAtLogin" type="checkbox" /> Launch at login</label>
    <label class="row"><input id="showCountdownInBar" type="checkbox" /> Show countdown next to the menu-bar icon <span style="color:#888">(macOS)</span></label>
  </details>

  <div class="save-bar"><button id="save">Save</button> <span id="saved"></span></div>

  <script src="../shared/chimes.js"></script>
  <script src="isolate.bundle.js"></script>
  <script src="settings.js"></script>
</body>
</html>
