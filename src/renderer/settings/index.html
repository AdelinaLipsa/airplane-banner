<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; color: #1e1b4b; }
    h1 { font-size: 18px; }
    fieldset { border: 1px solid #ddd; border-radius: 8px; margin: 14px 0; padding: 12px; }
    legend { font-weight: 600; }
    label { display: block; margin: 8px 0; font-size: 14px; }
    input[type=text], input[type=password] { width: 100%; padding: 6px; box-sizing: border-box; }
    .row { display: flex; align-items: center; gap: 8px; }
    button { background: #1e1b4b; color: #facc15; border: 0; border-radius: 6px;
             padding: 8px 14px; font-weight: 700; cursor: pointer; }
    #status { font-size: 13px; color: #555; }
    .save-bar { position: sticky; bottom: 0; background: #fff; padding-top: 10px; }

    /* Live theme preview — a tiny banner+plane loops across so the four styles
       can be compared without a Test flight. */
    #themePreview {
      position: relative; height: 84px; margin: 10px 0 4px; border-radius: 10px;
      overflow: hidden; border: 1px solid #e5e7eb;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
    }
    .mini-flight {
      position: absolute; top: 50%; left: 0; display: flex; align-items: center; gap: 6px;
      animation: miniFly 7s linear infinite;
    }
    @keyframes miniFly {
      from { transform: translate(-70%, -50%); }
      to   { transform: translate(540px, -50%); }
    }
    .mini-plane { height: 30px; filter: drop-shadow(3px 3px 0 var(--prevPop, #f43f5e)); }
    .mini-banner { white-space: nowrap; font-size: 13px; font-weight: 700; padding: 7px 13px; border-radius: 6px; }
    #themePreview[data-theme="retro"] .mini-banner {
      background: #facc15; color: #1e1b4b; font-family: ui-monospace, Menlo, monospace; box-shadow: 3px 3px 0 #f43f5e;
    }
    #themePreview[data-theme="aurora"] { background: linear-gradient(135deg, #0b1020, #1f2937); }
    #themePreview[data-theme="aurora"] .mini-banner {
      background: rgba(255,255,255,0.08); color: #e9f6ff; border: 1px solid rgba(255,255,255,0.3);
      -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); box-shadow: 0 0 18px rgba(94,234,212,0.55);
    }
    #themePreview[data-theme="sunset"] .mini-banner {
      background: linear-gradient(90deg, #fb7185, #f97316, #a855f7); color: #fff; border-radius: 999px;
      box-shadow: 0 8px 16px rgba(168,85,247,0.4);
    }
    #themePreview[data-theme="mono"] { background: #e5e7eb; }
    #themePreview[data-theme="mono"] .mini-banner {
      background: #0a0a0a; color: #fafafa; font-family: ui-monospace, Menlo, monospace;
      text-transform: uppercase; letter-spacing: 1px; border-radius: 3px;
    }
    @media (prefers-reduced-motion: reduce) { .mini-flight { animation: none; transform: translate(20px, -50%); } }
  </style>
</head>
<body>
  <h1>✈️ Airplane Banner</h1>

  <fieldset>
    <legend>Google Calendar</legend>
    <p id="status">Checking…</p>
    <div class="row">
      <button id="signIn">Sign in with Google</button>
      <button id="signOut">Sign out</button>
    </div>
  </fieldset>

  <fieldset>
    <legend>Reminders</legend>
    <label>Minutes before each meeting (comma-separated)
      <input id="offsets" type="text" placeholder="15, 5, 0" />
    </label>
    <label class="row"><input id="respectEventReminders" type="checkbox" /> Use each meeting’s own reminder times when it sets them</label>
    <p style="font-size:12px;color:#888;margin:4px 0 0">Tip: add <code>[no-fly]</code> to a meeting’s title to skip it.</p>
  </fieldset>

  <fieldset>
    <legend>When to fly</legend>
    <label class="row"><input id="activeHoursEnabled" type="checkbox" /> Only fly during working hours</label>
    <div id="activeHoursOpts" style="margin-left:24px">
      <label class="row">From
        <input id="startHour" type="number" min="0" max="23" style="width:60px" /> :00 &nbsp;to&nbsp;
        <input id="endHour" type="number" min="0" max="24" style="width:60px" /> :00
      </label>
      <div class="row" id="dayToggles" style="flex-wrap:wrap"></div>
    </div>
    <label class="row" style="margin-top:10px"><input id="suppressInFullscreen" type="checkbox" /> Don’t fly while another app is fullscreen (e.g. presenting)</label>
    <label class="row"><input id="suppressInDnd" type="checkbox" /> Don’t fly while a Focus / Do Not Disturb is on</label>
  </fieldset>

  <fieldset>
    <legend>Which meetings</legend>
    <label class="row"><input id="skipAllDay" type="checkbox" /> Skip all-day events</label>
    <label class="row"><input id="skipDeclined" type="checkbox" /> Skip events I declined</label>
    <label class="row"><input id="primaryCalendarOnly" type="checkbox" /> Primary calendar only</label>
    <label class="row"><input id="requireAttendeesOrLink" type="checkbox" /> Require attendees or a video link</label>
    <label class="row"><input id="showTitle" type="checkbox" /> Show meeting title on banner</label>
  </fieldset>

  <fieldset>
    <legend>Appearance</legend>
    <label>Banner theme
      <select id="theme">
        <option value="retro">Retro Arcade — yellow fabric, indigo, pink</option>
        <option value="aurora">Aurora Glass — dark, neon teal/violet</option>
        <option value="sunset">Sunset Pop — coral/orange, white</option>
        <option value="mono">Mono Minimal — black & white</option>
      </select>
    </label>
    <div id="themePreview" data-theme="retro">
      <div class="mini-flight">
        <div class="mini-banner">10 MIN → STANDUP</div>
        <img class="mini-plane" src="../overlay/plane.png" alt="" />
      </div>
    </div>
    <label>Flight duration: <strong id="durLabel">12s</strong> <span style="color:#888">(slower ⟷ faster)</span>
      <input id="flightDuration" type="range" min="4" max="30" step="1" style="width:100%" />
    </label>
    <label class="row"><input id="sound" type="checkbox" /> Play a sound when the plane flies</label>
    <div id="soundOpts" style="margin-left:24px">
      <label class="row">Chime
        <select id="soundName"></select>
        <button id="soundPreview" type="button" style="padding:4px 10px">▶ Preview</button>
      </label>
      <label>Volume: <strong id="volLabel">20%</strong>
        <input id="soundVolume" type="range" min="0" max="100" step="5" style="width:100%" />
      </label>
    </div>
    <label class="row"><input id="clickableBanner" type="checkbox" /> Click the banner to join the meeting (experimental)</label>
  </fieldset>

  <fieldset>
    <legend>App</legend>
    <label class="row"><input id="launchAtLogin" type="checkbox" /> Launch at login</label>
  </fieldset>

  <div class="save-bar"><button id="save">Save</button> <span id="saved"></span></div>

  <script src="../shared/chimes.js"></script>
  <script src="settings.js"></script>
</body>
</html>
