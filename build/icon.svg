<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.55" stop-color="#4338ca"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
  </defs>

  <!-- rounded background (macOS squircle proportions) -->
  <rect x="84" y="84" width="856" height="856" rx="196" fill="url(#bg)"/>

  <!-- starfield -->
  <g fill="#fde68a" opacity="0.75">
    <circle cx="250" cy="230" r="8"/>
    <circle cx="430" cy="180" r="5"/>
    <circle cx="800" cy="240" r="7"/>
    <circle cx="690" cy="800" r="6"/>
    <circle cx="300" cy="820" r="5"/>
    <circle cx="820" cy="760" r="5"/>
  </g>

  <!-- whole plane+banner assembly, tilted as one connected unit -->
  <g transform="rotate(-9 512 512)">
    <!-- banner: pink hard shadow + gold ribbon + indigo "text" lines -->
    <rect x="200" y="448" width="370" height="156" rx="18" fill="#f43f5e"/>
    <rect x="190" y="434" width="370" height="156" rx="18" fill="#facc15" stroke="#1e1b4b" stroke-width="11"/>
    <rect x="230" y="476" width="270" height="24" rx="12" fill="#1e1b4b"/>
    <rect x="230" y="524" width="196" height="24" rx="12" fill="#1e1b4b"/>

    <!-- tow lines to the plane -->
    <g stroke="#1e1b4b" stroke-width="9" stroke-linecap="round">
      <line x1="560" y1="486" x2="648" y2="492"/>
      <line x1="560" y1="540" x2="648" y2="528"/>
    </g>

    <!-- airplane (bold top-view silhouette, nose to the right; wing/tail tips
         rounded with quadratic corners so they read soft, not spiky) -->
    <path d="M888.3,516.1 Q912,512 888.3,507.9 L795.7,492.1 Q772,488 751.3,488 L746.7,488 Q726,488 707.8,472.4 L646.2,419.6 Q628,404 643.2,422.6 L674.8,461.4 Q690,480 675.6,480 L672.4,480 Q658,480 637.3,467.9 L620.7,458.1 Q600,446 617.4,462.6 L626.6,471.4 Q644,488 626.9,488 L623.1,488 Q606,488 606,509.6 L606,514.4 Q606,536 623.1,536 L626.9,536 Q644,536 626.6,552.6 L617.4,561.4 Q600,578 620.7,565.9 L637.3,556.1 Q658,544 672.4,544 L675.6,544 Q690,544 674.8,562.6 L643.2,601.4 Q628,620 646.2,604.4 L707.8,551.6 Q726,536 746.7,536 L751.3,536 Q772,536 795.7,531.9 Z"
          fill="#f8fafc" stroke="#1e1b4b" stroke-width="6" stroke-linejoin="round"/>
    <!-- pink fuselage stripe + cockpit -->
    <rect x="624" y="505" width="250" height="14" rx="7" fill="#f43f5e"/>
    <circle cx="858" cy="512" r="11" fill="#1e1b4b"/>
  </g>
</svg>
